<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Domain LLM POC — Comparison Architecture</text>
  <text x="500" y="56" text-anchor="middle" font-size="12.5" fill="#64748b">One base model · two levers (RAG + fine-tuning) · three side-by-side panels</text>

  <!-- Column headers -->
  <text x="260" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">RAG PATH</text>
  <text x="740" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">FINE-TUNING PATH</text>

  <!-- Inputs -->
  <rect x="110" y="82" width="300" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="260" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Domain Documents</text>
  <text x="260" y="122" text-anchor="middle" font-size="11.5" fill="#b45309">.txt / .md / .pdf  (you provide)</text>

  <rect x="590" y="82" width="300" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="740" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Training Dataset (JSONL)</text>
  <text x="740" y="122" text-anchor="middle" font-size="11.5" fill="#b45309">≥ 200 user→assistant pairs  (you provide)</text>

  <!-- Build steps -->
  <rect x="110" y="172" width="300" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="260" y="193" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Chunk + Embed</text>
  <text x="260" y="212" text-anchor="middle" font-size="11.5" fill="#1d4ed8">all-MiniLM-L6-v2 · ~500-token chunks</text>

  <rect x="590" y="172" width="300" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="740" y="193" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">QLoRA Fine-Tune</text>
  <text x="740" y="212" text-anchor="middle" font-size="11.5" fill="#6d28d9">Unsloth + LoRA · seed 42 · &lt; 90 min</text>

  <!-- Artifacts -->
  <rect x="110" y="262" width="300" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="283" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">ChromaDB Vector Index</text>
  <text x="260" y="302" text-anchor="middle" font-size="11.5" fill="#1d4ed8">top-3 similarity search · saved to Drive</text>

  <rect x="590" y="262" width="300" height="52" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="283" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">LoRA Adapter (~100 MB)</text>
  <text x="740" y="302" text-anchor="middle" font-size="11.5" fill="#6d28d9">domain tone + terminology · saved to Drive</text>

  <!-- Base model -->
  <rect x="200" y="352" width="600" height="60" rx="10" fill="#e2e8f0" stroke="#475569" stroke-width="1.8"/>
  <text x="500" y="378" text-anchor="middle" font-size="15.5" font-weight="700" fill="#1e293b">Base Model — Qwen (4-bit NF4)</text>
  <text x="500" y="398" text-anchor="middle" font-size="11.5" fill="#475569">A100: Qwen3.5-9B · auto-fallback to Qwen3-4B on &lt; 24 GB GPUs · shared by all panels</text>

  <!-- Panels heading -->
  <text x="500" y="444" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">THREE INFERENCE PATHS</text>

  <!-- Panel 1 -->
  <rect x="40" y="460" width="270" height="104" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="175" y="487" text-anchor="middle" font-size="14.5" font-weight="700" fill="#334155">Standard Model</text>
  <text x="175" y="511" text-anchor="middle" font-size="12" fill="#475569">Base only — the raw baseline</text>
  <text x="175" y="537" text-anchor="middle" font-size="12.5" font-weight="600" fill="#64748b">✗ adapter    ✗ RAG</text>

  <!-- Panel 2 -->
  <rect x="365" y="460" width="270" height="104" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="500" y="487" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e40af">Standard + Docs</text>
  <text x="500" y="511" text-anchor="middle" font-size="12" fill="#1d4ed8">Base + retrieved context</text>
  <text x="500" y="537" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2563eb">✗ adapter    ✓ RAG</text>

  <!-- Panel 3 -->
  <rect x="690" y="460" width="270" height="104" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="825" y="487" text-anchor="middle" font-size="14.5" font-weight="700" fill="#166534">Specialized Model</text>
  <text x="825" y="511" text-anchor="middle" font-size="12" fill="#15803d">Base + adapter + context</text>
  <text x="825" y="537" text-anchor="middle" font-size="12.5" font-weight="600" fill="#16a34a">✓ adapter    ✓ RAG</text>

  <!-- Gradio bar -->
  <rect x="40" y="598" width="920" height="52" rx="8" fill="#0f172a"/>
  <text x="500" y="620" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc">Gradio UI — one question box, one Submit → all three panels at once</text>
  <text x="500" y="639" text-anchor="middle" font-size="11.5" fill="#94a3b8">temporary public share link (share=True)</text>

  <!-- Fair comparison note -->
  <rect x="40" y="680" width="920" height="66" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="500" y="706" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400e">Fair comparison — the only differences between panels are the adapter and the retrieved context.</text>
  <text x="500" y="727" text-anchor="middle" font-size="11.5" fill="#b45309">Same base model · same 4-bit quantization · same system prompt · same generation settings (temp 0.1, thinking off).</text>

  <!-- Arrows: inputs -> build -->
  <line x1="260" y1="134" x2="260" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="134" x2="740" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrows: build -> artifacts -->
  <line x1="260" y1="224" x2="260" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="224" x2="740" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrows: artifacts -> base model -->
  <line x1="260" y1="314" x2="260" y2="351" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="314" x2="740" y2="351" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrows: base model -> panels -->
  <line x1="320" y1="412" x2="180" y2="458" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="412" x2="500" y2="458" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="412" x2="820" y2="458" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrows: panels -> gradio -->
  <line x1="175" y1="564" x2="175" y2="596" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="564" x2="500" y2="596" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="825" y1="564" x2="825" y2="596" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
